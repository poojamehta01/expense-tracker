# fly.toml app configuration file generated for expense-tracker-pooja on 2026-03-21T17:58:08+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'expense-tracker-pooja'
primary_region = 'sin'

[build]

[env]
  NODE_ENV = 'production'

[[mounts]]
  source = 'expense_data'
  destination = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
